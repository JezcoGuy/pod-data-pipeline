# Public API vhost — terminates SSL for YOUR_API_SUBDOMAIN.
# Before deploying:
#   1. Replace every YOUR_API_SUBDOMAIN with your actual subdomain
#      (e.g. api.example.com)
#   2. Obtain the Let's Encrypt cert:
#        certbot --nginx -d YOUR_API_SUBDOMAIN --non-interactive \
#                --agree-tos -m you@example.com --redirect
#   3. Open ports 80 + 443 in your VPS firewall — many providers
#      block them by default. ufw allow 80/tcp && ufw allow 443/tcp
#   4. Symlink + reload:
#        ln -s /etc/nginx/sites-available/api.conf /etc/nginx/sites-enabled/
#        nginx -t && systemctl reload nginx

server {
    listen 443 ssl;
    server_name YOUR_API_SUBDOMAIN;

    ssl_certificate /etc/letsencrypt/live/YOUR_API_SUBDOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_API_SUBDOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /withdrawal {
        proxy_pass http://127.0.0.1:8090/withdrawal;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name YOUR_API_SUBDOMAIN;
    return 301 https://$host$request_uri;
}
