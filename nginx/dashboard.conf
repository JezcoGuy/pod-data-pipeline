server {
    listen 8091;
    server_name _;

    # Update root to match your install path
    # e.g. /opt/YOUR_BRAND_ID/dashboard
    root /opt/YOUR_BRAND_ID/dashboard;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /snapshot {
        proxy_pass http://127.0.0.1:8090/snapshot;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /pl-monthly {
        proxy_pass http://127.0.0.1:8090/pl-monthly;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health-snapshot {
        proxy_pass http://127.0.0.1:8090/health-snapshot;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Category signals (independent of tasks — drives the always-on tiles)
    location /category-signals {
        proxy_pass http://127.0.0.1:8090/category-signals;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Task manager API: /tasks/priority|add|update|edit
    location /tasks/ {
        proxy_pass http://127.0.0.1:8090/tasks/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Task manager API: /time-log/add
    location /time-log/ {
        proxy_pass http://127.0.0.1:8090/time-log/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
