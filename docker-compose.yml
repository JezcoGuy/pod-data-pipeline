version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ${BRAND_ID}_postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # IMPORTANT: Do NOT rely on Docker's auto-migration.
      # docker-entrypoint-initdb.d sorts files alphabetically, which
      # sorts v8.1 before v8.00 and v8.10 before v8.2. Apply migrations
      # in version order with:
      #   bash scripts/core/apply_migrations.sh
    ports:
      - "5432:5432"
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest
    container_name: ${BRAND_ID}_metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ${DB_USER}
      MB_DB_PASS: ${DB_PASSWORD}
      MB_DB_HOST: postgres
    depends_on:
      - postgres
    restart: unless-stopped

  nocodb:
    image: nocodb/nocodb:latest
    container_name: ${BRAND_ID}_nocodb
    ports:
      - "8080:8080"
    environment:
      NC_DB: pg://postgres:5432?u=${DB_USER}&p=${DB_PASSWORD}&d=nocodb
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
